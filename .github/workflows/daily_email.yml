name: Daily Message of Support

on:
  schedule:
    # 9:30 AM EST = 14:30 UTC
    # 9:30 AM EDT = 13:30 UTC
    # Setting to 13:30 UTC to ensure it arrives by morning (earlier is better than later?)
    # or just 14:30 UTC. Let's use 14:30 UTC.
    - cron: '30 14 * * *'
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Daily Email
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python daily_email.py

      # GitHub disables scheduled workflows after 60 days without any repository
      # activity (commits/pushes). This step records the last successful run,
      # which counts as activity and keeps the schedule from being auto-disabled.
      - name: Record last successful run
        run: |
          mkdir -p .github/data
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/data/last_run.txt

      - name: Commit last run marker
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/data/last_run.txt
          git diff --staged --quiet && exit 0
          git commit -m "chore: record last successful daily email run [skip ci]"
          git push
